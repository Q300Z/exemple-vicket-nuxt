services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time variables from .env
        - NUXT_PUBLIC_VICKET_API_URL=${NUXT_PUBLIC_VICKET_API_URL}
    ports:
      - "3000:3000"
    # Unified configuration via .env
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: always
