name: industrial-ci
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      VICKET_API_KEY: ${{ secrets.VICKET_API_KEY }}
      VICKET_API_URL: ${{ secrets.VICKET_API_URL }}
      NUXT_PUBLIC_VICKET_API_URL: "http://localhost:3000/api/vicket"
      NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run test
      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run test:e2e

  deploy:
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VICKET_API_KEY: ${{ secrets.VICKET_API_KEY }}
      VICKET_API_URL: ${{ secrets.VICKET_API_URL }}
      NUXT_PUBLIC_VICKET_API_URL: "https://vicket.qalpuch.cc/api/vicket"
      NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase repo
        run: echo "REPO=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO }}:latest,ghcr.io/${{ env.REPO }}:${{ github.ref_name }}
